  <ellipse cx="0" cy="0" rx="32" ry="14" fill="none" stroke="#cbd5e1" stroke-width="1" transform="rotate(15)"/>
  <circle cx="0" cy="0" r="14" fill="#1e1b4b"/>
  <circle cx="0" cy="0" r="5" fill="#fbbf24"/>
  <circle cx="-42" cy="-15" r="4" fill="#f59e0b"/>
  <circle cx="28" cy="10" r="3.5" fill="#94a3b8"/>
</g>
<text x="210" y="114" font-family="Georgia, 'Cormorant Garamond', serif" font-weight="600" font-size="48" fill="#1e1b4b">Sýnesis</text>
