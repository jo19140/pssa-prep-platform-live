<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" role="img">
<title>Sýnesis · Convergence mark</title>
<desc>Three small colored circles converging into one dark indigo center, paired with the Sýnesis wordmark.</desc>
<g transform="translate(140, 100)">
  <circle cx="-70" cy="-30" r="9" fill="#f59e0b"/>
  <circle cx="-70" cy="0" r="9" fill="#fb923c"/>
  <circle cx="-70" cy="30" r="9" fill="#a78bfa"/>
  <line x1="-61" y1="-30" x2="-9" y2="-4" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="-61" y1="0" x2="-9" y2="0" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="-61" y1="30" x2="-9" y2="4" stroke="#cbd5e1" stroke-width="1.5"/>
  <circle cx="10" cy="0" r="22" fill="#1e1b4b"/>
  <circle cx="10" cy="0" r="6" fill="#fbbf24"/>
</g>
<text x="210" y="114" font-family="Georgia, 'Cormorant Garamond', serif" font-weight="600" font-size="48" fill="#1e1b4b">Sýnesis</text>
<circle cx="236" cy="72" r="3" fill="#f59e0b"/>
</svg>
