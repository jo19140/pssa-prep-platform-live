<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520">
  <title>Bright Ideas Children's Museum Floor Map</title>
  <desc>Two-level museum map with exhibit rooms, legend, elevator route, family rest area, and Story Stage show times.</desc>
  <rect x="20" y="20" width="720" height="480" fill="#ffffff" stroke="#111827" stroke-width="3"/>
  <text x="380" y="54" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#111827">Bright Ideas Children's Museum Floor Map</text>

  <rect x="60" y="92" width="280" height="290" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="200" y="122" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#111827">Level 1</text>
  <rect x="88" y="150" width="98" height="58" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="137" y="174" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#111827">Entrance</text>
  <text x="137" y="192" text-anchor="middle" font-family="Arial" font-size="12" fill="#111827">Star symbol</text>
  <rect x="208" y="150" width="104" height="58" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="260" y="174" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#111827">Build Lab</text>
  <text x="260" y="192" text-anchor="middle" font-family="Arial" font-size="12" fill="#111827">Blocks + ramps</text>
  <rect x="88" y="230" width="104" height="58" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="140" y="254" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#111827">Story Stage</text>
  <text x="140" y="272" text-anchor="middle" font-family="Arial" font-size="12" fill="#111827">Book symbol</text>
  <rect x="208" y="230" width="104" height="58" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="260" y="254" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#111827">Quiet Corner</text>
  <text x="260" y="272" text-anchor="middle" font-family="Arial" font-size="12" fill="#111827">Rest + read</text>
  <rect x="88" y="312" width="104" height="46" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
