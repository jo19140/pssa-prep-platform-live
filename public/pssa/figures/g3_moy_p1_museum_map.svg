  <rect x="420" y="92" width="280" height="290" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="560" y="122" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#111827">Level 2</text>
  <rect x="448" y="150" width="104" height="58" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
  <text x="500" y="174" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#111827">Art Studio</text>
  <text x="500" y="192" text-anchor="middle" font-family="Arial" font-size="12" fill="#111827">Draw + paint</text>
  <rect x="568" y="150" width="104" height="58" fill="#ffedd5" stroke="#c2410c" stroke-width="2"/>
  <text x="620" y="174" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#111827">Dinosaur Dig</text>
  <text x="620" y="192" text-anchor="middle" font-family="Arial" font-size="12" fill="#111827">Fossil area</text>
  <rect x="448" y="230" width="104" height="58" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="500" y="254" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#111827">Elevator</text>
  <text x="500" y="272" text-anchor="middle" font-family="Arial" font-size="12" fill="#111827">Accessible route</text>
  <rect x="568" y="230" width="104" height="58" fill="#e5e7eb" stroke="#374151" stroke-width="2"/>
  <text x="620" y="254" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#111827">Stairs</text>
  <rect x="448" y="312" width="224" height="46" fill="#cffafe" stroke="#0e7490" stroke-width="2"/>
  <text x="560" y="340" text-anchor="middle" font-family="Arial" font-size="13" font-weight="700" fill="#111827">Family Rest Area</text>

  <polyline points="137,150 137,335 500,335 500,259 620,259 620,209" fill="none" stroke="#15803d" stroke-width="5" stroke-dasharray="10 6"/>
  <polygon points="620,209 610,229 630,229" fill="#15803d"/>
  <text x="364" y="326" text-anchor="middle" font-family="Arial" font-size="14" font-weight="700" fill="#15803d">Accessible route: Entrance to Elevator to Dinosaur Dig</text>

  <rect x="60" y="410" width="300" height="64" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="78" y="434" font-family="Arial" font-size="13" font-weight="700" fill="#111827">Legend</text>
  <text x="78" y="456" font-family="Arial" font-size="12" fill="#111827">Star = Entrance · Book = Story Stage · Green dashed line = accessible route</text>

  <rect x="420" y="410" width="280" height="64" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="438" y="434" font-family="Arial" font-size="13" font-weight="700" fill="#111827">Story Stage show times</text>
  <text x="438" y="456" font-family="Arial" font-size="13" fill="#111827">11:00 · 1:00 · 3:00</text>
