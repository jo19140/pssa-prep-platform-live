<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360"><title>How a Crayon Is Made</title><desc>Five labeled process stages for making a crayon.</desc><text x="24" y="36">How a Crayon Is Made</text><text x="24" y="64">Melt the wax</text><text x="24" y="92">Paraffin wax is heated or kept warm until it is liquid.</text><text x="24" y="120">Add the color</text><text x="24" y="148">Powdered pigment is blended in to give the wax its color.</text><text x="24" y="176">Fill the mold</text><text x="24" y="204">The colored wax is poured into crayon-shaped holes and cooled.</text><text x="24" y="232">Push out and check</text><text x="24" y="260">Hardened crayons are pushed out; broken or chipped ones are removed.</text><text x="24" y="288">Wrap and pack</text><text x="24" y="316">Each crayon gets a paper label, then crayons are sorted and boxed.</text><rect x="24" y="220" width="72" height="60" fill="#fff" stroke="#111"/><text x="34" y="254">1</text><rect x="124" y="220" width="72" height="60" fill="#fff" stroke="#111"/><text x="134" y="254">2</text><rect x="224" y="220" width="72" height="60" fill="#fff" stroke="#111"/><text x="234" y="254">3</text><rect x="324" y="220" width="72" height="60" fill="#fff" stroke="#111"/><text x="334" y="254">4</text><rect x="424" y="220" width="72" height="60" fill="#fff" stroke="#111"/><text x="434" y="254">5</text><line x1="92" y1="250" x2="132" y2="250" stroke="#111"/><line x1="192" y1="250" x2="232" y2="250" stroke="#111"/><line x1="292" y1="250" x2="332" y2="250" stroke="#111"/><line x1="392" y1="250" x2="432" y2="250" stroke="#111"/></svg>